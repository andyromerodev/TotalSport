<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalSport Admin Local</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="mast">
        <p class="kicker">TotalSport</p>
        <h1>Admin de Inventario y Ganancia</h1>
        <p class="lead">Panel local en <strong>localhost</strong>. No expone costos ni ventas al sitio público.</p>
      </header>

      <section class="metrics" id="metrics"></section>

      <section class="layout">
        <article class="card controls">
          <h2>Registrar movimiento</h2>
          <form id="movement-form">
            <label>
              Producto
              <select id="productId" required></select>
            </label>

            <div class="row-2">
              <label>
                Tipo
                <select id="type" required>
                  <option value="ENTRY">Entrada</option>
                  <option value="EXIT">Salida</option>
                  <option value="ADJUSTMENT">Ajuste</option>
                  <option value="SALE">Venta</option>
                </select>
              </label>

              <label>
                Cantidad
                <input id="qty" type="number" min="1" step="1" required />
              </label>
            </div>

            <label id="adjustment-wrap" class="hidden">
              Ajuste
              <select id="adjustmentSign">
                <option value="IN">Sumar stock</option>
                <option value="OUT">Restar stock</option>
              </select>
            </label>

            <div class="row-2">
              <label>
                Costo unitario (USD)
                <input id="unitCostUsd" type="number" min="0" step="0.01" />
              </label>

              <label>
                Precio venta (USD)
                <input id="unitSaleUsd" type="number" min="0" step="0.01" />
              </label>
            </div>

            <label>
              Nota
              <input id="note" type="text" maxlength="120" placeholder="Ej: venta presencial" />
            </label>

            <button type="submit" class="btn-primary">Guardar movimiento</button>
          </form>

          <div class="stack">
            <button id="export-stock" class="btn-secondary" type="button">Exportar stock público</button>
            <p id="status" class="status"></p>
          </div>
        </article>

        <article class="card list">
          <div class="list-head">
            <h2>Productos</h2>
            <input id="search" type="search" placeholder="Buscar producto" />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Tienda</th>
                  <th>Stock</th>
                  <th>Costo</th>
                  <th>Precio</th>
                  <th>Ganancia</th>
                </tr>
              </thead>
              <tbody id="products-table"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="card ledger">
        <div class="list-head">
          <h2>Historial</h2>
          <div class="range">
            <input id="from" type="date" />
            <input id="to" type="date" />
            <button id="refresh" type="button" class="btn-tertiary">Filtrar</button>
          </div>
        </div>
        <ul id="ledger-list"></ul>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
