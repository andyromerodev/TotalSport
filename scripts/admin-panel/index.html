<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalSport Admin Local</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="mast">
        <p class="kicker">TotalSport Admin</p>
        <h1>Admin de Inventario y Ganancia</h1>
        <p class="lead">Panel local en <strong>localhost</strong>. No expone costos ni ventas al sitio público.</p>
        <p class="runtime" id="runtime-meta"></p>
      </header>

      <section class="metrics" id="metrics"></section>

      <section class="layout">
        <article class="card list">
          <div class="list-head">
            <div class="card-head">
              <h2>Productos</h2>
              <p class="muted" id="products-count"></p>
            </div>
            <div class="table-tools">
              <label class="sr-only" for="search">Buscar producto</label>
              <input id="search" type="search" placeholder="Buscar producto" />
              <button id="export-stock" class="btn-secondary" type="button">Exportar stock público</button>
            </div>
          </div>
          <p id="status" class="status"></p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Tienda</th>
                  <th>Stock</th>
                  <th>Costo</th>
                  <th>Precio</th>
                  <th>Ganancia</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="products-table"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="card ledger">
        <div class="list-head">
          <div class="card-head">
            <h2>Historial</h2>
            <p class="muted">Ultimos movimientos registrados</p>
          </div>
          <div class="range">
            <label class="sr-only" for="from">Desde</label>
            <input id="from" type="date" />
            <label class="sr-only" for="to">Hasta</label>
            <input id="to" type="date" />
            <button id="refresh" type="button" class="btn-tertiary">Filtrar</button>
          </div>
        </div>
        <ul id="ledger-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
